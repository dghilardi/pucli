name: Tests

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Install protoc
      run: |
        sudo apt-get update
        sudo apt-get -y install protobuf-compiler
    - name: Run tests
      run: cargo test --verbose
